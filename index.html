<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - Website Name</title>
  <link rel="icon" type="image/png" href="http://tcla.stuffnest.org/logo-c.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-overlay: rgba(5, 8, 15, 0.6);
      --card-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      --card-border: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      /* Robust fallback background in case the video fails to load */
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
    }

    /* Ambient background glow */
    .ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 60%);
      z-index: -1;
      border-radius: 50%;
      pointer-events: none;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-color: #000;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8; /* Blends slightly with the dark background */
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-overlay);
      z-index: -1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 10;
    }

    .content-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 4rem 3.5rem;
      border-radius: 30px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      text-align: center;
      max-width: 600px;
      width: 100%;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6), 
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 40px rgba(56, 189, 248, 0.1);
      position: relative;
      overflow: hidden;
    }

    /* Subtle card highlight effect */
    .content-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: skewX(-20deg);
      animation: shine 8s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    .animate-item {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      animation: smoothReveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }

    @keyframes smoothReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 2.5rem;
      animation: float 6s ease-in-out infinite alternate;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-10px); }
    }

    .logo-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 1.5rem;
    }

    /* Glowing ring around logo */
    .logo-wrapper::after {
      content: '';
      position: absolute;
      top: -5px; left: -5px; right: -5px; bottom: -5px;
      border-radius: 50%;
      background: linear-gradient(45deg, #38bdf8, #818cf8, #38bdf8);
      z-index: -1;
      animation: spin 4s linear infinite;
      opacity: 0.5;
      filter: blur(8px);
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .logo-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.8);
      background-color: #0f172a;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      color: var(--accent);
      display: inline-flex;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1;
      margin: 0;
      letter-spacing: -2px;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #ffffff 30%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    @media (max-width: 600px) {
      .content-card { padding: 3rem 1.5rem; border-radius: 20px; }
      .logo-wrapper { width: 90px; height: 90px; }
      .brand-name { font-size: 1.2rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>

  <div class="video-container">
    <video id="bg-video" autoplay loop muted playsinline preload="metadata">
        <source src="https://cdn.pixabay.com/video/2024/06/07/215697_large.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
  </div>
  <div class="overlay"></div>

  <main class="container">
    <div class="content-card">
      
      <div class="logo-container animate-item delay-1">
        <div class="logo-wrapper">
          <img src="https://placehold.co/240x240/1e293b/38bdf8?text=LOGO" alt="Logo Placeholder" class="logo-img">
        </div>
        
        <div class="brand-name">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" />
            </svg>
          </div>
          Website Name
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" />
            </svg>
          </div>
        </div>
      </div>

      <h1 class="animate-item delay-2">Coming Soon</h1>

    </div>
  </main>

  <script>
    // Fallback logic: If the video fails to load, the CSS gradient background will seamlessly take over.
    const video = document.getElementById('bg-video');
    video.addEventListener('error', () => {
      console.log('Video failed to load. Falling back to CSS gradient background.');
      video.style.display = 'none';
    });
  </script>
</body>
</html>
